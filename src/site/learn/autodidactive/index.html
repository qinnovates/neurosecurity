<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#10b981">
  <meta name="description" content="Autodidactive — A daily learning companion for polymaths, philosophers, scientists, and beyond">
  <title>Autodidactive</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css?v=8">
</head>
<body>
  <div class="app">
    <!-- Views -->
    <main class="app-main">
      <div id="view-home" class="view active"></div>
      <div id="view-interactive" class="view"></div>
      <div id="view-learn" class="view"></div>
      <div id="view-notewall" class="view view-notewall"></div>
      <div id="view-audio" class="view"></div>
      <div id="view-profile" class="view"></div>
    </main>
  </div>

  <!-- Search Overlay -->
  <div id="search-overlay" class="search-overlay" style="display:none;">
    <div class="search-overlay-content">
      <div class="search-header">
        <input type="text" id="search-input" class="search-input" placeholder="Search people, quotes, concepts..." autocomplete="off" />
        <button id="search-close" class="search-close-btn" aria-label="Close search">&times;</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <!-- Canvas View -->
  <div id="canvas-view" class="canvas-view" style="display:none;">
    <div class="canvas-header">
      <button class="canvas-back-btn" onclick="window._closeCanvas()">← Back</button>
      <h2 class="canvas-title">Concept Canvas</h2>
    </div>
    <div id="canvas-controls-container"></div>
    <div class="canvas-workspace">
      <div id="canvas-tray" class="canvas-tray"></div>
      <div id="canvas-container" class="canvas-container"></div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Tutor Chat Panel -->
  <div id="tutor-panel" class="tutor-panel" style="display:none;">
    <div class="tutor-panel-header">
      <h3 class="tutor-panel-title">Tutor</h3>
      <button class="tutor-panel-close" onclick="window._closeTutor()">&times;</button>
    </div>
    <div id="tutor-messages" class="tutor-messages"></div>
    <div class="tutor-input-row">
      <input type="text" id="tutor-input" class="tutor-input" placeholder="Ask anything..." autocomplete="off" />
      <button id="tutor-send" class="tutor-send-btn" aria-label="Send">→</button>
    </div>
  </div>

  <!-- Tutor FAB -->
  <button id="tutor-fab" class="tutor-fab" aria-label="Open tutor" onclick="window._openTutor()">✨</button>

  <!-- Bottom Tab Nav -->
  <nav class="tab-nav" role="navigation" aria-label="Main navigation">
    <button class="tab-nav__item active" data-view="home" aria-label="Home">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="tab-nav__label">Home</span>
    </button>
    <button class="tab-nav__item" data-view="interactive" aria-label="Interactive">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      <span class="tab-nav__label">Interactive</span>
    </button>
    <button class="tab-nav__item" data-view="learn" aria-label="Learn">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      <span class="tab-nav__label">Learn</span>
    </button>
    <button class="tab-nav__item" data-view="notewall" aria-label="Note Wall">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="9" y1="21" x2="9" y2="9"/>
      </svg>
      <span class="tab-nav__label">Notes</span>
    </button>
    <button class="tab-nav__item" data-view="audio" aria-label="Audio">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      <span class="tab-nav__label">Audio</span>
    </button>
    <button class="tab-nav__item" data-view="profile" aria-label="Profile">
      <svg class="tab-nav__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="tab-nav__label">Profile</span>
    </button>
  </nav>

  <script type="module" src="js/app.js?v=8"></script>
</body>
</html>
