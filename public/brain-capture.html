<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const W = 800, H = 800;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 1000);
// Side view (lateral/sagittal) — looking from the LEFT (flipped)
camera.position.set(-55, 8, 3);
camera.lookAt(0, -2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(2);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 1);
dl.position.set(10, 10, 5);
scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x93c5fd, 0.4);
dl2.position.set(-5, -5, 10);
scene.add(dl2);

const loader = new GLTFLoader();
loader.load('/models/brain.glb', (gltf) => {
  const brain = gltf.scene;
  brain.scale.set(18, 18, 18);

  // Wireframe version
  brain.traverse((child) => {
    if (child.isMesh) {
      child.material = new THREE.MeshBasicMaterial({
        color: new THREE.Color('#3b82f6'),
        wireframe: true,
        transparent: true,
        opacity: 0.35,
      });
    }
  });
  scene.add(brain);

  // Ghost solid version
  const ghost = brain.clone(true);
  ghost.traverse((child) => {
    if (child.isMesh) {
      child.material = new THREE.MeshBasicMaterial({
        color: new THREE.Color('#dbeafe'),
        transparent: true,
        opacity: 0.12,
        side: THREE.DoubleSide,
      });
    }
  });
  scene.add(ghost);

  // Anatomically accurate hotspot positions on lateral brain (model scale 18)
  // Y = superior/inferior, Z = anterior/posterior in this model
  // Colors: Red (most techniques) → Amber (fewest). Sizes proportional to technique count.
  // N7:45, N6:31, N5:22, N4:18, N1:18, N3:14, N2:8
  const hotspots = {
    N7: { pos: [0, 10, 6], size: 4.2, color: '#dc2626' },    // 45 techniques — RED (most at risk)
    N6: { pos: [0, 1, 3], size: 3.2, color: '#ef4444' },     // 31 techniques
    N5: { pos: [0, 2, 6], size: 2.6, color: '#f97316' },     // 22 techniques
    N4: { pos: [0, -1, 0], size: 2.2, color: '#fb923c' },    // 18 techniques
    N3: { pos: [0, -4, -12], size: 2.8, color: '#fbbf24' },  // 14 techniques
    N2: { pos: [0, -7, -5], size: 1.8, color: '#fcd34d' },   // 8 techniques — AMBER (least at risk)
    N1: { pos: [0, -13, -3], size: 2.2, color: '#fb923c' },  // 18 techniques
  };

  for (const [id, h] of Object.entries(hotspots)) {
    // Outer glow
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(h.size * 1.2, 24, 24),
      new THREE.MeshBasicMaterial({ color: h.color, transparent: true, opacity: 0.2, depthWrite: false, depthTest: false })
    );
    glow.position.set(...h.pos);
    glow.renderOrder = 10;
    scene.add(glow);

    // Core sphere
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(h.size * 0.45, 24, 24),
      new THREE.MeshBasicMaterial({ color: h.color, transparent: true, opacity: 0.75, depthWrite: false, depthTest: false })
    );
    core.position.set(...h.pos);
    core.renderOrder = 11;
    scene.add(core);
  }

  document.title = 'BRAIN_READY';
  animate();
}, undefined, (err) => {
  console.error('Failed to load brain model:', err);
  document.title = 'BRAIN_ERROR';
});

function animate() {
  renderer.render(scene, camera);
}
</script>
</body>
</html>
