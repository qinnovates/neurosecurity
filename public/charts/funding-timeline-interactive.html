  .subtitle { color: #94a3b8; font-size: 0.85rem; margin-bottom: 16px; }
  #chart { width: 100%; height: 600px; cursor: pointer; }
  .stats { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
  .stat { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 16px; min-width: 120px; }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: #3b82f6; }
  .stat-label { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

  /* Detail panel */
  #detail-panel {
    display: none;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 24px;
    margin-top: 16px;
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  #detail-panel.visible { display: block; }
  .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .detail-company { font-size: 1.3rem; font-weight: 700; }
  .detail-close { background: #334155; border: none; color: #94a3b8; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .detail-close:hover { background: #475569; color: #e2e8f0; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .detail-section h3 { font-size: 0.75rem; text-transform: uppercase; color: #64748b; margin-bottom: 8px; letter-spacing: 0.05em; }
  .round-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #334155; font-size: 0.85rem; }
  .round-row:last-child { border-bottom: none; }
  .investor-tag { display: inline-block; background: #334155; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; margin: 2px; }
  .investor-tag.lead { background: #1e3a5f; color: #60a5fa; }
  .device-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
  .device-invasive { background: rgba(239,68,68,0.2); color: #ef4444; }
  .device-non_invasive { background: rgba(59,130,246,0.2); color: #3b82f6; }
  .device-semi_invasive { background: rgba(245,158,11,0.2); color: #f59e0b; }

  .footer { margin-top: 16px; font-size: 0.7rem; color: #475569; text-align: center; }
  .hint { text-align: center; color: #475569; font-size: 0.75rem; margin-top: 8px; }
</style>
</head>

const companyMap = new Map();

  if (!r.amount || r.amount <= 0) return;
  if (!companyMap.has(r.company)) {
    companyMap.set(r.company, { rounds: [], cumulative: 0, deviceType: r.deviceType, category: r.category });
  }
  const entry = companyMap.get(r.company);
  entry.cumulative += r.amount;
  entry.rounds.push({
    date: r.date,
    amount: r.amount,
    cumulative: entry.cumulative,
    series: r.series,
    investors: r.investors || [],
    leadInvestors: r.leadInvestors || [],
    note: r.note || '',
  });
});

const sorted = [...companyMap.entries()].sort((a, b) => b[1].cumulative - a[1].cumulative);

const COLORS = {
  'Neuralink': '#ef4444',
  'Synchron': '#06b6d4',
  'BrainCo': '#3b82f6',
  'MindMaze': '#8b5cf6',
  'Precision Neuroscience': '#10b981',
  'Merge Labs': '#f59e0b',
  'Kernel': '#ec4899',
  'Paradromics': '#f97316',
  'INBRAIN Neuroelectronics': '#14b8a6',
  'Blackrock Neurotech': '#a78bfa',
  'Neurable': '#fbbf24',
  'InteraXon (Muse)': '#6366f1',
  'CTRL-Labs': '#fb923c',
  'Cognixion': '#22d3ee',
  'Arctop': '#4ade80',
};
const fallbackColor = '#64748b';

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

// ── Build shared monthly timeline and forward-fill ──
// Collect all unique months from all rounds
const allMonths = new Set();
companyMap.forEach(d => d.rounds.forEach(r => {
  allMonths.add(r.date.slice(0, 7)); // YYYY-MM
}));
// Add start month (one month before earliest) and end month
const monthsSorted = [...allMonths].sort();
const timeline = monthsSorted.map(m => m + '-15');

// For each company, build a value at every timeline point (forward-fill)
const companyTimelines = new Map();
sorted.forEach(([company, data]) => {
  const values = [];
  let cum = 0;
  let roundIdx = 0;
  const rounds = data.rounds.sort((a, b) => a.date.localeCompare(b.date));

  timeline.forEach(t => {
    const tMonth = t.slice(0, 7);
    // Apply any rounds at this month
    while (roundIdx < rounds.length && rounds[roundIdx].date.slice(0, 7) <= tMonth) {
      cum = rounds[roundIdx].cumulative;
      roundIdx++;
    }
    values.push(cum / 1e6);
  });
  companyTimelines.set(company, values);
});

// ── Build stacked area traces (bottom to top: smallest company first) ──
const stackOrder = [...sorted].reverse(); // smallest on bottom
const traces = [];

stackOrder.forEach(([company, data], i) => {
  const color = COLORS[company] || fallbackColor;
  const [cr, cg, cb] = hexToRgb(color);
  const values = companyTimelines.get(company);

  // Build hover text for each timeline point
  const hoverText = timeline.map((t, ti) => {
    const val = values[ti];
    if (val === 0) return '';
    // Find if there's a round at this exact month
    const tMonth = t.slice(0, 7);
    const roundHere = data.rounds.find(r => r.date.slice(0, 7) === tMonth);
    let text = `<b>${company}</b>: $${val.toFixed(0)}M cumulative`;
    if (roundHere) {
      const leads = roundHere.leadInvestors.length > 0 ? `<br>Lead: ${roundHere.leadInvestors.join(', ')}` : '';
      text += `<br><b>${roundHere.series}</b>: +$${(roundHere.amount/1e6).toFixed(1)}M${leads}`;
      if (roundHere.note) text += `<br><i>${roundHere.note}</i>`;
    }
    return text;
  });

  traces.push({
    x: timeline,
    y: values,
    name: company,
    type: 'scatter',
    mode: 'lines',
    stackgroup: 'funding',
    groupnorm: '',
    line: { color: color, width: 1 },
    fillcolor: `rgba(${cr},${cg},${cb},0.65)`,
    text: hoverText,
    hoverinfo: 'text',
    hovertemplate: '%{text}<extra></extra>',
    hoveron: 'points+fills',
  });
});

const layout = {
  paper_bgcolor: '#0f172a',
  plot_bgcolor: '#1e293b',
  font: { color: '#e2e8f0', family: '-apple-system, BlinkMacSystemFont, sans-serif', size: 12 },
  xaxis: {
    gridcolor: '#334155',
    linecolor: '#334155',
    tickfont: { color: '#94a3b8' },
    dtick: 'M12',
    tickformat: '%Y',
  },
  yaxis: {
    gridcolor: '#334155',
    linecolor: '#334155',
    tickfont: { color: '#94a3b8' },
    title: { text: 'Cumulative Industry Funding (USD Millions)', font: { size: 11, color: '#94a3b8' } },
    tickprefix: '$',
    ticksuffix: 'M',
    rangemode: 'tozero',
  },
  legend: {
    bgcolor: 'rgba(15,23,42,0.95)',
    bordercolor: '#334155',
    borderwidth: 1,
    font: { size: 10 },
    orientation: 'v',
    x: 1.02,
    y: 1,
    traceorder: 'reversed',
  },
  hovermode: 'closest',
  hoverlabel: {
    bgcolor: '#1e293b',
    bordercolor: '#475569',
    font: { size: 11, color: '#e2e8f0' },
  },
  margin: { t: 30, r: 180, b: 50, l: 80 },
  shapes: [{
    type: 'line',
    x0: '2023-01-15', x1: '2023-01-15',
    y0: 0, y1: 1, yref: 'paper',
    line: { color: '#475569', width: 1, dash: 'dash' },
  }],
  annotations: [{
    x: '2023-04-15', y: 0.97, yref: 'paper',
    text: '2023: BCI race begins',
    showarrow: false,
    font: { color: '#64748b', size: 10 },
  }],
};

const config = {
  responsive: true,
  displayModeBar: true,
  modeBarButtonsToRemove: ['lasso2d', 'select2d'],
  displaylogo: false,
  toImageButtonOptions: { format: 'png', filename: 'bci-funding-timeline', height: 800, width: 1400, scale: 2 },
};

// ── Trend line: exponential fit on total cumulative, projected to 2028 ──
// Compute total cumulative at each timeline point
const totalAtEachPoint = timeline.map((t, i) => {
  let total = 0;
  companyTimelines.forEach(vals => { total += vals[i]; });
  return total; // already in millions
});

// Fit exponential: log(y) = a + b*x via least squares on non-zero points
const fitPoints = [];
const t0 = new Date(timeline[0]).getTime();
timeline.forEach((t, i) => {
  if (totalAtEachPoint[i] > 0) {
    const months = (new Date(t).getTime() - t0) / (30.44 * 24 * 60 * 60 * 1000);
    fitPoints.push({ x: months, y: totalAtEachPoint[i] });
  }
});

// Simple least-squares on log(y) = a + b*x
const n = fitPoints.length;
const sumX = fitPoints.reduce((s, p) => s + p.x, 0);
const sumLogY = fitPoints.reduce((s, p) => s + Math.log(p.y), 0);
const sumX2 = fitPoints.reduce((s, p) => s + p.x * p.x, 0);
const sumXLogY = fitPoints.reduce((s, p) => s + p.x * Math.log(p.y), 0);
const bFit = (n * sumXLogY - sumX * sumLogY) / (n * sumX2 - sumX * sumX);
const aFit = (sumLogY - bFit * sumX) / n;

// Generate trend + projection dates (extend 24 months past last data point)
const lastDate = new Date(timeline[timeline.length - 1]);
const projectionEnd = new Date(lastDate);
projectionEnd.setMonth(projectionEnd.getMonth() + 24);

const trendDates = [];
const trendValues = [];
const projDates = [];
const projValues = [];

// Historical trend line (fitted)
timeline.forEach((t, i) => {
  if (totalAtEachPoint[i] > 0) {
    const months = (new Date(t).getTime() - t0) / (30.44 * 24 * 60 * 60 * 1000);
    trendDates.push(t);
    trendValues.push(Math.exp(aFit + bFit * months));
  }
});

// Projection (dashed, from last data point forward)
for (let m = 0; m <= 24; m += 3) {
  const d = new Date(lastDate);
  d.setMonth(d.getMonth() + m);
  const dateStr = d.toISOString().slice(0, 10);
  const months = (d.getTime() - t0) / (30.44 * 24 * 60 * 60 * 1000);
  projDates.push(dateStr);
  projValues.push(Math.exp(aFit + bFit * months));
}

// Add trend line trace
traces.push({
  x: trendDates,
  y: trendValues,
  name: 'Trend (exp. fit)',
  type: 'scatter',
  mode: 'lines',
  line: { color: '#e2e8f0', width: 2, dash: 'dot' },
  hoverinfo: 'text',
  text: trendDates.map((d, i) => `<b>Trend</b>: $${trendValues[i].toFixed(0)}M<br>${d.slice(0,7)}`),
});

// Add projection trace
traces.push({
  x: projDates,
  y: projValues,
  name: 'Projection',
  type: 'scatter',
  mode: 'lines',
  line: { color: '#e2e8f0', width: 2, dash: 'dash' },
  fill: 'tozeroy',
  fillcolor: 'rgba(226,232,240,0.04)',
  hoverinfo: 'text',
  text: projDates.map((d, i) => `<b>Projected</b>: $${(projValues[i]/1000).toFixed(1)}B<br>${d.slice(0,7)}`),
});

// Add projection endpoint annotation
const projEndVal = projValues[projValues.length - 1];
layout.annotations.push({
  x: projDates[projDates.length - 1],
  y: projEndVal,
  text: `$${(projEndVal/1000).toFixed(1)}B projected`,
  showarrow: true,
  arrowhead: 2,
  arrowcolor: '#94a3b8',
  font: { color: '#e2e8f0', size: 11, weight: 700 },
  bgcolor: 'rgba(15,23,42,0.8)',
  bordercolor: '#475569',
  borderwidth: 1,
  borderpad: 4,
});

Plotly.newPlot('chart', traces, layout, config);

// ── Click: show detail panel for clicked company ──
const chartEl = document.getElementById('chart');
let activeCompany = null;

chartEl.on('plotly_click', function(eventData) {
  const pt = eventData.points[0];
  const traceIdx = pt.curveNumber;
  const company = traces[traceIdx].name;

  if (activeCompany === company) {
    activeCompany = null;
    closeDetail();
    return;
  }

  activeCompany = company;
  showDetail(company);
});

// ── Detail panel ──
function showDetail(company) {
  const data = companyMap.get(company);
  if (!data) return;

  document.getElementById('hint').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');

  // Header
  document.getElementById('detail-name').textContent = company;
  const badge = document.getElementById('detail-badge');
  const typeLabel = { invasive: 'Invasive', non_invasive: 'Non-invasive', semi_invasive: 'Semi-invasive' };
  badge.textContent = typeLabel[data.deviceType] || data.deviceType;
  badge.className = `device-badge device-${data.deviceType}`;

  // Rounds
  const roundsEl = document.getElementById('detail-rounds');
  roundsEl.innerHTML = data.rounds.map(r =>
    `<div class="round-row">
      <span><b>${r.series}</b> <span style="color:#64748b">${r.date.slice(0,7)}</span></span>
      <span style="color:${COLORS[company] || fallbackColor}; font-weight:700">$${(r.amount/1e6).toFixed(1)}M</span>
    </div>` +
    (r.note ? `<div style="font-size:0.75rem; color:#64748b; padding:2px 0 6px; font-style:italic">${r.note}</div>` : '')
  ).join('') +
  `<div class="round-row" style="border-top:2px solid #475569; margin-top:4px; padding-top:8px; font-weight:700">
    <span>Total</span>
    <span style="color:#e2e8f0">$${(data.cumulative/1e6).toFixed(0)}M</span>
  </div>`;

  // Investors (deduplicated)
  const allInvestors = new Map();
  data.rounds.forEach(r => {
    const leadSet = new Set(r.leadInvestors);
    r.investors.forEach(inv => {
      if (inv === 'undisclosed') return;
      if (!allInvestors.has(inv)) allInvestors.set(inv, { lead: false });
      if (leadSet.has(inv)) allInvestors.get(inv).lead = true;
    });
  });
  const investorsEl = document.getElementById('detail-investors');
  const investorsSorted = [...allInvestors.entries()].sort((a, b) => (b[1].lead ? 1 : 0) - (a[1].lead ? 1 : 0));
  investorsEl.innerHTML = investorsSorted.map(([name, info]) =>
    `<span class="investor-tag ${info.lead ? 'lead' : ''}">${info.lead ? '&#9733; ' : ''}${name}</span>`
  ).join('') || '<span style="color:#64748b">Undisclosed</span>';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('hint').style.display = 'block';
  activeCompany = null;
  resetHighlight();
}

// ── Stats bar ──
const totalFunding = [...companyMap.values()].reduce((s, d) => s + d.cumulative, 0);
const totalRounds = [...companyMap.values()].reduce((s, d) => s + d.rounds.length, 0);
const allInvestorsGlobal = new Set();
companyMap.forEach(d => d.rounds.forEach(r => r.investors.forEach(i => { if (i !== 'undisclosed') allInvestorsGlobal.add(i); })));

document.getElementById('stats').innerHTML = [
  { value: `$${(totalFunding / 1e9).toFixed(1)}B`, label: 'Total Raised' },
  { value: totalRounds, label: 'Funding Rounds' },
  { value: companyMap.size, label: 'Companies' },
  { value: allInvestorsGlobal.size, label: 'Unique Investors' },
].map(s => `<div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
</script>
