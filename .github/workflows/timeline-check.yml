name: Timeline Staleness Check

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0  # full history for git log scan

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'

      - name: Run timeline check
        id: check
        continue-on-error: true
        run: node src/scripts/timeline-check.mjs --dry-run

      - name: Warn if stale
        if: steps.check.outcome == 'failure'
        run: |
          echo "::warning::QIF timeline stats appear stale. Run 'node src/scripts/timeline-check.mjs --fix' locally to update."
