name: Security Scan
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Build
        run: npm run build
