name: Verify Citations & Facts

on:
  pull_request:
    paths:
      - 'research/paper/**'
      - 'research/blog/**'
      - 'datalake/qtara-registrar.json'
      - 'src/lib/whitepaper-stats.ts'
      - 'osi-of-mind/**'
  push:
    branches: [main]
    paths:
      - 'research/blog/**'
      - 'osi-of-mind/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Run verification pipeline
        run: python3 src/scripts/verify/run_all.py --ci

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7 # TODO: pin to SHA
        with:
          name: verify-report
          path: verify-report.json
