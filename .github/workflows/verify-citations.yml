name: Verify Citations & Facts

on:
  pull_request:
    paths:
      - 'paper/**'
      - 'blogs/**'
      - 'shared/qtara-registrar.json'
      - 'src/lib/whitepaper-stats.ts'
      - 'qif-framework/**'
  push:
    branches: [main]
    paths:
      - 'blogs/**'
      - 'qif-framework/**'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Run verification pipeline
        run: python3 scripts/verify/run_all.py --ci

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7 # TODO: pin to SHA
        with:
          name: verify-report
          path: verify-report.json
