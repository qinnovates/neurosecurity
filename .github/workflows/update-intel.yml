name: Update BCI Intel Feed

# Runs weekly on Sunday at noon EST (17:00 UTC).
# Fetches 50+ RSS feeds, deduplicates, tags, and appends new items
# to the accumulating bci-intel-feed.json store.

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch intel feeds
        id: fetch
        run: |
          node scripts/fetch-intel.mjs && echo "changed=true" >> "$GITHUB_OUTPUT" || {
            exit_code=$?
            if [ "$exit_code" -eq 2 ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              exit $exit_code
            fi
          }

      - name: Commit updated feed
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/bci-intel-feed.json
          git commit -m "auto: update BCI intel feed [skip ci-deploy]"
          git push

  alert-on-failure:
    needs: update-feed
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const title = `Intel feed pipeline failed — ${new Date().toISOString().slice(0, 10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['pipeline-failure'],
              body: [
                `The **Update BCI Intel Feed** workflow failed.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Triggered by:** ${context.eventName}`,
                ``,
                `Check the logs for feed fetch errors, network timeouts, or commit failures.`,
              ].join('\n'),
            });
