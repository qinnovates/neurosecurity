name: Update News Feed Cache

# Runs daily at noon EST (17:00 UTC). Only updates the RSS cache file.
# If the cache changes, commits it — which triggers deploy.yml via push.
# This keeps the news feed fresh without rebuilding the entire site on a timer.

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS feeds
        id: fetch
        run: |
          node scripts/fetch-news.mjs && echo "changed=true" >> "$GITHUB_OUTPUT" || {
            exit_code=$?
            if [ "$exit_code" -eq 2 ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              exit $exit_code
            fi
          }

      - name: Commit updated cache
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/external-news-cache.json
          git commit -m "chore: update news feed cache [skip ci-deploy]"
          git push

  alert-on-failure:
    needs: update-cache
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        with:
          script: |
            const title = `News feed pipeline failed — ${new Date().toISOString().slice(0, 10)}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pipeline-failure',
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['pipeline-failure'],
              body: [
                `The **Update News Feed Cache** workflow failed.`,
                ``,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                `**Triggered by:** ${context.eventName}`,
                ``,
                `Check the logs for RSS fetch errors, network timeouts, or commit failures.`,
              ].join('\n'),
            });
