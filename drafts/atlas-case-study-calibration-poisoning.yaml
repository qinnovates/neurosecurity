id:                             # Assigned by MITRE on acceptance
object-type: case-study
name: "Calibration Data Poisoning Against EEG-Based Brain-Computer Interface Decoders"

summary: >
  Researchers identified that the calibration phase of EEG-based
  brain-computer interface (BCI) systems represents an exploitable
  training data pipeline. BCI decoders require periodic calibration
  sessions where the user performs known cognitive tasks while the
  system records corresponding neural signals to train its
  classifier. Bonaci et al. (2015) demonstrated that a malicious
  third-party BCI application can corrupt this calibration data by
  presenting altered stimuli or injecting noise during the
  calibration session, causing the decoder to learn incorrect
  neural-to-intent mappings. Meng et al. (2024) independently
  confirmed that EEG classifiers are vulnerable to both evasion and
  backdoor attacks through adversarial perturbation of training data,
  with attack success rates exceeding 80% across multiple classifier
  architectures. Once poisoned, the BCI decoder persistently
  misclassifies the user's intended commands. In assistive
  communication or motor control contexts, this causes the device to
  execute unintended actions. The attack persists until the system is
  recalibrated with clean data.

incident-date: 2015-06
incident-date-granularity: MONTH

actor: "Security researchers (University of Washington; Guangzhou University)"
target: "EEG-based BCI classifiers during calibration/training phase"
reporter: "Bonaci et al., IEEE Technology and Society Magazine (2015)"
case-study-type: exercise

procedure:
  - tactic: AML.TA0000          # Reconnaissance
    technique: AML.T0014        # Discover ML Model Ontology
    description: >
      The researchers identified that BCI systems follow a standard
      machine learning pipeline where a calibration session generates
      labeled training data (neural signal segments paired with known
      user intentions). This calibration data directly trains the
      classifier that translates EEG signals into device commands. The
      calibration application often runs as a separate software
      component, and in consumer BCI ecosystems, third-party
      applications may control the calibration stimulus presentation.
      Bonaci et al. (2015) identified this application-controlled
      calibration as the primary attack surface.

  - tactic: AML.TA0002          # ML Attack Staging
    technique: AML.T0020        # Poison Training Data
    description: >
      A malicious calibration application corrupts the training data
      pipeline by presenting incorrect or subtly altered stimuli
      during the calibration session. When the user believes they are
      performing a "think left" task, the application labels the
      recorded neural data as "think right." Alternatively, the
      application injects adversarial noise into the recorded EEG
      during calibration. Meng et al. (2024) demonstrated that
      adversarial filtering-based perturbations applied to EEG
      training data achieve backdoor attack success rates exceeding
      80% across CNN, EEGNet, and other common BCI classifier
      architectures. The poisoning is invisible to the user because
      the calibration session appears to proceed normally.

  - tactic: AML.TA0002          # ML Attack Staging
    technique: AML.T0019        # Publish Poisoned Datasets
    description: >
      In multi-user or shared BCI research environments, poisoned
      calibration datasets could be distributed as benchmark training
      data. Meng et al. (2024) showed that backdoor triggers embedded
      in EEG training data survive across multiple classifier training
      runs, meaning a single poisoned dataset could compromise all
      models trained on it. The adversarial perturbations are small
      enough to evade visual inspection of the EEG signals.

  - tactic: AML.TA0010          # Impact
    technique: AML.T0015        # Evade ML Model
    description: >
      The poisoned BCI decoder persistently misclassifies user intent.
      Commands are mapped to incorrect actions — the user intends
      "select" but the decoder outputs "cancel," or intended cursor
      movement directions are reversed. In assistive communication
      contexts (e.g., ALS patients using BCI spellers), this renders
      the device unreliable. In closed-loop neurostimulation systems,
      misclassified intent could trigger incorrect stimulation
      patterns. Bonaci et al. (2015) noted that the attack persists
      until the system is recalibrated with verified clean data, and
      that users may not immediately recognize the decoder has been
      compromised, attributing errors to normal BCI variability.

references:
  - title: "Bonaci et al. (2015) — App Stores for the Brain: Privacy & Security in Brain-Computer Interfaces. IEEE Technology and Society Magazine, 34(2):32-39"
    url: https://doi.org/10.1109/MTS.2015.2425551
  - title: "Meng et al. (2024) — Adversarial filtering based evasion and backdoor attacks to EEG-based brain-computer interfaces. Information Fusion, 107:102316"
    url: https://doi.org/10.1016/j.inffus.2024.102316
